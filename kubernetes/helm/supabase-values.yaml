
# 1. Database Configuration
# Re-enable the internal Postgres pod since it is already Bound to gp3
postgresql:
  enabled: true
  persistence:
    enabled: true
    storageClass: "gp3"
    size: 5Gi

# Link to the secret we found earlier
db:
  existingSecret: "supabase-db"
  secretKey: "password"
  database: "postgres"
  port: 5432

# 2. Studio Configuration (Fixes the "API Error")
studio:
  enabled: true
  # The URL your browser uses
  publicUrl: "http://supabase.local"
  # The INTERNAL URL the Studio pod uses to talk to the API gateway
  apiUrl: "http://supabase-supabase-kong:8000"
  existingSecret: "supabase-dashboard"

# 3. Auth & JWT (Required for generating API Keys)
auth:
  jwt:
    existingSecret: "supabase-jwt"
    secretKey: "secret"

# 4. API Gateway (Kong)
kong:
  enabled: true
  contentLength:
    enabled: false

# 5. Ingress Configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: supabase.local
      paths:
        - path: /
          pathType: ImplementationSpecific

# 6. Scaling (Based on your previous file)
postgrest:
  replicaCount: 2
  resources:
    limits:
      cpu: 500m
      memory: 512Mi

